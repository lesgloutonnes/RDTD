<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="240" viewBox="0 0 200 240">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e8f5d8" stop-opacity="0.35"/>
      <stop offset="42%" stop-color="#3d6b38" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#080f08" stop-opacity="0.98"/>
    </linearGradient>
    <radialGradient id="rim" cx="50%" cy="22%" r="62%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="45%" stop-color="#c8e8b0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4a6a42" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="epic" cx="50%" cy="40%" r="48%">
      <stop offset="0%" stop-color="#c090e8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c090e8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trap" x1="0.25" y1="0" x2="0.75" y2="1">
      <stop offset="0%" stop-color="#f8fff0"/>
      <stop offset="38%" stop-color="#dce8c8"/>
      <stop offset="100%" stop-color="#6a8a58"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a8a38" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2d5a22" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="mouth" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fff8ec"/>
      <stop offset="100%" stop-color="#e8c8a8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="200" height="240" fill="url(#bg)"/>
  <rect width="200" height="240" fill="url(#rim)"/>
  <rect width="200" height="240" fill="url(#epic)"/>

  <!-- Trap arrière-plan -->
  <g opacity="0.42" transform="translate(8 18) scale(0.78)">
    <path d="M92 188 C58 152,54 112,72 90 C90 68,118 66,138 80 C158 66,186 70,202 92 C216 114,210 154,170 188 Z" fill="#5a7a50"/>
    <path d="M92 98 L80 132 L104 132 Z" fill="#d8e8c8"/>
  </g>

  <!-- Trap principal -->
  <path d="M100 206 C56 162,50 108,74 78 C96 54,132 52,158 72 C184 52,218 58,236 86 C252 114,244 168,196 206 Z" fill="url(#trap)"/>
  <!-- Rayures variegata -->
  <path d="M78 118 Q88 96,100 88 Q112 96,122 118" fill="none" stroke="url(#stripe)" stroke-width="5" opacity="0.75"/>
  <path d="M66 142 Q82 118,100 108 Q118 118,134 142" fill="none" stroke="url(#stripe)" stroke-width="4" opacity="0.65"/>
  <path d="M58 168 Q78 140,100 128 Q122 140,142 168" fill="none" stroke="url(#stripe)" stroke-width="3.5" opacity="0.55"/>

  <!-- Mâchoire intérieure -->
  <path d="M100 92 L84 134 L116 134 Z" fill="url(#mouth)"/>
  <path d="M100 100 L92 124 L108 124 Z" fill="#f0d8c0" opacity="0.55"/>

  <!-- Dents -->
  <g fill="#f4fff0" stroke="#8aaa78" stroke-width="0.6">
    <path d="M72 126 L68 108 L76 122 Z"/>
    <path d="M82 118 L78 98 L86 114 Z"/>
    <path d="M92 110 L90 90 L96 106 Z"/>
    <path d="M108 110 L104 90 L110 106 Z"/>
    <path d="M118 118 L114 98 L122 114 Z"/>
    <path d="M128 126 L124 108 L132 122 Z"/>
  </g>

  <!-- Lueur crocs -->
  <ellipse cx="100" cy="118" rx="22" ry="10" fill="#ffffff" opacity="0.12" filter="url(#soft)"/>

  <!-- Tige -->
  <path d="M100 206 Q98 220,96 228" stroke="#3a5a30" stroke-width="7" fill="none" stroke-linecap="round"/>
  <ellipse cx="96" cy="230" rx="16" ry="5" fill="#0a1008" opacity="0.45"/>
</svg>
